<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ATM手数料">
<title>ATM手数料チェッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: #E5E3DC;
    --text: #1A1A18;
    --text-muted: #888780;
    --blue: #185FA5;
    --blue-bg: #E6F1FB;
    --green: #0F6E56;
    --green-bg: #E1F5EE;
    --red: #993C1D;
    --red-bg: #FAECE7;
    --accent: #185FA5;
    --radius: 12px;
    --radius-sm: 8px;
  }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 2rem;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem 0.875rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  header p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .container { max-width: 480px; margin: 0 auto; padding: 1.25rem 1rem; }
  .section { margin-bottom: 1.5rem; }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .bank-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .bank-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .bank-btn:active { transform: scale(0.97); }
  .bank-btn.selected {
    border-color: var(--blue);
    border-width: 2px;
    background: var(--blue-bg);
  }
  .bank-btn .name { font-size: 13px; font-weight: 700; color: var(--text); }
  .bank-btn .type { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .bank-btn.selected .name { color: var(--blue); }
  .atm-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .atm-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 10px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    text-align: left;
    line-height: 1.4;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .atm-btn:active { transform: scale(0.97); }
  .atm-btn.selected { border-color: var(--blue); border-width: 2px; background: var(--blue-bg); color: var(--blue); }
  .time-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
  .time-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    text-align: left;
    line-height: 1.4;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    font-family: 'Noto Sans JP', sans-serif;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .time-btn:active { transform: scale(0.99); }
  .time-btn.selected { border-color: var(--blue); border-width: 2px; background: var(--blue-bg); color: var(--blue); }
  .time-btn .arrow { font-size: 14px; color: var(--text-muted); }
  .time-btn.selected .arrow { color: var(--blue); }
  .now-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--blue);
    background: var(--blue-bg);
    border: none;
    border-radius: 20px;
    padding: 5px 12px;
    cursor: pointer;
    margin-bottom: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    -webkit-tap-highlight-color: transparent;
  }
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    min-height: 80px;
  }
  .result-empty { font-size: 13px; color: var(--text-muted); text-align: center; padding: 1rem 0; }
  .result-bank { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .result-fee { font-size: 36px; font-weight: 700; letter-spacing: -0.02em; }
  .result-fee.free { color: var(--green); }
  .result-fee.paid { color: var(--red); }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 6px;
  }
  .badge-free { background: var(--green-bg); color: var(--green); }
  .badge-fee { background: var(--red-bg); color: var(--red); }
  .result-note {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 10px;
    line-height: 1.7;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .placeholder {
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
  }
  .step-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .step-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--border);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .step-dot.active { background: var(--blue); color: white; }
  .step-dot.done { background: var(--green); color: white; }
</style>
</head>
<body>
<header>
  <h1>ATM手数料チェッカー</h1>
  <p>銀行・ATM・時間帯を選んで手数料を確認</p>
</header>

<div class="container">
  <div class="section">
    <div class="step-indicator">
      <div class="step-dot active" id="dot1">1</div>
      <div class="section-label" style="margin:0">銀行を選択</div>
    </div>
    <div class="bank-grid">
      <button class="bank-btn selected" data-bank="mufg" onclick="selectBank(this)">
        <div class="name">三菱UFJ銀行</div>
        <div class="type">メガバンク</div>
      </button>
      <button class="bank-btn" data-bank="yucho" onclick="selectBank(this)">
        <div class="name">ゆうちょ銀行</div>
        <div class="type">郵政系</div>
      </button>
      <button class="bank-btn" data-bank="rakuten" onclick="selectBank(this)">
        <div class="name">楽天銀行</div>
        <div class="type">ネットバンク</div>
      </button>
      <button class="bank-btn" data-bank="ncb" onclick="selectBank(this)">
        <div class="name">西日本シティ銀行</div>
        <div class="type">地方銀行</div>

    </div>
  </div>

  <div class="section">
    <div class="step-indicator">
      <div class="step-dot" id="dot2">2</div>
      <div class="section-label" style="margin:0">ATMを選択</div>
    </div>
    <div class="atm-grid" id="atm-grid">
      <div class="placeholder" style="grid-column:1/-1">↑ 銀行を選んでください</div>
    </div>
  </div>

  <div class="section">
    <div class="step-indicator">
      <div class="step-dot" id="dot3">3</div>
      <div class="section-label" style="margin:0">時間帯を選択</div>
    </div>
    <button class="now-btn" onclick="setNow()">⏱ 現在時刻で自動選択</button>
    <div class="time-grid" id="time-grid">
      <div class="placeholder">↑ ATMを選んでください</div>
    </div>
  </div>

  <div class="section">
    <div class="step-indicator">
      <div class="step-dot" id="dot4">4</div>
      <div class="section-label" style="margin:0">手数料</div>
    </div>
    <div class="result-card" id="result-card">
      <p class="result-empty">銀行・ATM・時間帯を選ぶと<br>手数料が表示されます</p>
    </div>
  </div>

let selectedBank = "mufg";
let selectedAtm = null;
let selectedTime = null;

function selectBank(btn) {
  document.querySelectorAll(".bank-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  selectedBank = btn.dataset.bank;
  selectedAtm = null;
  selectedTime = null;
  renderAtms();
  clearResult();
  document.getElementById("dot1").className = "step-dot done";
  document.getElementById("dot2").className = "step-dot active";
  document.getElementById("dot3").className = "step-dot";
  document.getElementById("dot4").className = "step-dot";
}

function renderAtms() {
  const grid = document.getElementById("atm-grid");
  const atms = data[selectedBank].atms;
  grid.innerHTML = atms.map(a =>
    `<button class="atm-btn" data-atm="${a.id}" onclick="selectAtm(this)">${a.label.replace(/\n/g, '<br>')}</button>`
  ).join('');
  document.getElementById("time-grid").innerHTML = '<div class="placeholder">↑ ATMを選んでください</div>';
}

function selectAtm(btn) {
  document.querySelectorAll(".atm-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  selectedAtm = btn.dataset.atm;
  selectedTime = null;
  renderTimes();
  clearResult();
  document.getElementById("dot2").className = "step-dot done";
  document.getElementById("dot3").className = "step-dot active";
  document.getElementById("dot4").className = "step-dot";
}

function renderTimes() {
  const grid = document.getElementById("time-grid");
  const feeData = data[selectedBank].fees[selectedAtm];
  grid.innerHTML = feeData.times.map((t, i) =>
    `<button class="time-btn" data-idx="${i}" onclick="selectTime(this)"><span>${t}</span><span class="arrow">›</span></button>`
  ).join('');
}

function selectTime(btn) {
  document.querySelectorAll(".time-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  selectedTime = parseInt(btn.dataset.idx);
  showResult();
  document.getElementById("dot3").className = "step-dot done";
  document.getElementById("dot4").className = "step-dot active";
}

function showResult() {
  const r = data[selectedBank].fees[selectedAtm].results[selectedTime];
  const card = document.getElementById("result-card");
  const isFree = r.fee === 0;
  card.innerHTML = `
    <p class="result-bank">${data[selectedBank].name}</p>
    <p class="result-fee ${isFree ? 'free' : 'paid'}">${isFree ? '無料' : r.fee + '円'}</p>
    <span class="badge ${isFree ? 'badge-free' : 'badge-fee'}">${isFree ? '手数料なし' : '手数料あり'}</span>
    <p class="result-note">${r.note}</p>
  `;
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function clearResult() {
  document.getElementById("result-card").innerHTML = '<p class="result-empty">銀行・ATM・時間帯を選ぶと<br>手数料が表示されます</p>';
}

function setNow() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const day = now.getDay();
  const timeStr = `${h}:${String(m).padStart(2,'0')}`;
  const dayStr = day === 0 ? '日曜' : day === 6 ? '土曜' : '平日';
  alert(`現在時刻: ${dayStr} ${timeStr}\n\n上のリストから該当する時間帯のボタンを選んでください。`);
}

renderAtms();

</html>
